# Universal Schema v1.0 — synced from the cogine-ai org-wide spec.
# Canonical spec: https://github.com/cogine-ai/.github/blob/main/LABELS.md
# Template source: https://github.com/cogine-ai/.github/blob/main/templates/labels.yml
#
# Edit the area:* section at the bottom for this repo only.
# DO NOT rename labels in the "Locked legacy" section — they are read by
# exact name by cron automation.

# === type:* ===
- name: 'type:bug'
  color: 'd73a4a'
  description: 'Existing feature behaving incorrectly'
- name: 'type:feature'
  color: 'a2eeef'
  description: 'A new capability'
- name: 'type:story'
  color: '7057ff'
  description: 'User-value narrative spanning multiple issues'
- name: 'type:task'
  color: 'c5def5'
  description: 'Engineering or ops work, no direct user-facing value'
- name: 'type:docs'
  color: '0075ca'
  description: 'Documentation-only change'
- name: 'type:decision'
  color: '5319e7'
  description: 'Pending decision record (RFC or discussion)'
- name: 'type:feedback'
  color: 'bfd4f2'
  description: 'External feedback, not yet broken down'

# === status:* ===
- name: 'status:needs-triage'
  color: 'ededed'
  description: 'New, not yet classified'
- name: 'status:backlog'
  color: 'c2e0c6'
  description: 'Classified but not scheduled'
- name: 'status:ready'
  color: '2cbe4e'
  description: 'Ready to be picked up'
- name: 'status:blocked'
  color: 'e11d21'
  description: 'External blocker (dependency, upstream, design, review)'
- name: 'status:needs-design'
  color: '006b75'
  description: 'Implementation needs design output first'
- name: 'status:needs-repro'
  color: 'f9d0c4'
  description: 'Bug lacks reproducible steps'
- name: 'status:duplicate-candidate'
  color: 'eb6420'
  description: 'Suspected duplicate, awaiting human confirmation'

# === priority:* ===
- name: 'priority:p0'
  color: '8b0000'
  description: 'Drop everything else'
- name: 'priority:p1'
  color: 'ee0701'
  description: 'High — schedule this sprint'
- name: 'priority:p2'
  color: 'f2b400'
  description: 'Normal'
- name: 'priority:p3'
  color: '1d76db'
  description: 'Low — nice to have'

# === size:* ===
- name: 'size:xs'
  color: 'cce5ff'
  description: 'Less than half a day'
- name: 'size:s'
  color: '99ccff'
  description: 'Half a day to one day'
- name: 'size:m'
  color: '6699ff'
  description: '1–3 days'
- name: 'size:l'
  color: '3366cc'
  description: 'About a week'
- name: 'size:xl'
  color: '0033aa'
  description: 'More than a week — consider splitting'

# === bot:* ===
- name: 'bot:created'
  color: 'cfd3d7'
  description: 'Created by an automation bot'
- name: 'bot:triaged'
  color: 'cfd3d7'
  description: 'A bot has classified and labeled this'
- name: 'bot:validated'
  color: 'cfd3d7'
  description: 'A bot has verified (repro / dedup / dependencies)'
- name: 'bot:needs-human'
  color: 'ffd700'
  description: 'Bot lacks confidence or permission; human takeover required'

# === LOCKED legacy: read/written by exact name by cron automation. DO NOT RENAME. ===
- name: 'auto-todo'
  color: '0e8a16'
  description: 'Auto-generated from code TODO/FIXME comments'
- name: 'todo'
  color: 'fbca04'
  description: 'TODO marker in code'
- name: 'fixme'
  color: 'e99695'
  description: 'FIXME marker in code'
- name: 'possibly-duplicate'
  color: 'd93f0b'
  description: 'Auto-detected as possibly duplicate of another issue'
- name: 'needs-conflict-resolve'
  color: 'b60205'
  description: 'Conflicts with base branch require manual resolution'

# === REPO-LOCAL: cliq-agent uses `area:*` (tool/code repo). ===
# Existing area labels — colors and descriptions preserved verbatim from the repo.
# Do not modify these without coordinating; they were thoughtfully written.
- name: 'area:model'
  color: '0e8a16'
  description: 'Model providers, config, streaming, and adapters'
- name: 'area:session'
  color: '006b75'
  description: 'Session persistence, migration, and replay'
- name: 'area:runtime'
  color: '5319e7'
  description: 'Agent loop, hooks, policies, and runtime events'
- name: 'area:cli'
  color: '1d76db'
  description: 'CLI, argument parsing, and interactive mode'
- name: 'area:tools'
  color: 'fbca04'
  description: 'Model-callable local tools and action protocol'
- name: 'area:docs'
  color: '0075ca'
  description: 'README, guides, examples, and documentation'
# New area labels introduced with Schema v1.0.
- name: 'area:tui'
  color: 'd4c5f9'
  description: 'Terminal UI (src/tui)'
- name: 'area:rpc'
  color: 'd4c5f9'
  description: 'RPC and protocol layer (src/protocol)'
- name: 'area:release'
  color: 'd4c5f9'
  description: 'Packaging, publishing, and release workflows'
