name: Question
description: Ask about usage, configuration, or project direction.
title: "[Question]: "
labels: ["question", "needs triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or accomplish?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include relevant commands or config. Do not include API keys or private session data.
      placeholder: |
        I ran:
        `cliq --provider ollama --model qwen3:14b "..."`
    validations:
      required: false
