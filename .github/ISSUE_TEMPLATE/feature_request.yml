name: Feature request
description: Suggest a focused improvement to Cliq.
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests focused. Small, concrete improvements are easier to discuss and review.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
      placeholder: "When using Cliq for..., I need..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should Cliq do differently?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / interactive mode
        - runtime / agent loop
        - model providers
        - tools / protocol
        - session / persistence
        - skills / extensions
        - docs / examples
        - other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful if there is a simpler way to solve the problem.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement or test this.
          required: false
